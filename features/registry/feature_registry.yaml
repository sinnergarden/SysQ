version: 2
description: Qsys 正式 feature registry。正式特征按通用建模语义分组，Qlib 内置与自定义实现统一登记在同一套身份体系中。
identity_policy:
  id_rule: F0001 递增编号，一经分配不复用。
  implementation_rule: feature id 与 name 表示稳定身份；provider_expression 与 qlib_column_name 表示当前实现。
providers:
  qlib_raw_field:
    description: Qlib 已落库的原始日频字段，通过 Qlib DataLoader 直接按表达式读取。
    provider_ref: qsys.feature.library.FeatureLibrary
  qlib_alpha158:
    description: Qlib Alpha158 内置表达式因子集合。
    provider_ref: qlib.contrib.data.handler.Alpha158DL.get_feature_config
  custom_python:
    description: Qsys 自定义 Python builder，在 panel-friendly DataFrame 上增量补列。
    provider_ref: qsys.feature.builder.build_research_features
feature_groups:
  price:
    description: 原生价格字段与价格比例类正式特征，强调单日价格状态与连续价格路径。
    order: 10
  liquidity:
    description: 成交量、成交额、换手与量能冲击特征。
    order: 20
  microstructure:
    description: K 线结构、区间位置与日内形态表达。
    order: 30
  tradability:
    description: 停牌、涨跌停与可交易性约束特征。
    order: 40
  cross_section:
    description: 横截面分位、相对强弱、行业相对位置与比较型特征。
    order: 50
  regime:
    description: 市场环境、风格代理与系统性波动状态。
    order: 60
  fundamental:
    description: 估值、规模、财务质量与慢变量背景特征。
    order: 70
  event:
    description: 资金流、两融与其他行为/事件驱动特征。
    order: 80
