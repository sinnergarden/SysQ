version: 1
description: Qsys feature set source of truth。对外推荐使用语义化的 set 名称，历史名字仅保留兼容映射。
feature_sets:
  price_volume_expression_core_v1:
    description: 以 Qlib Alpha158 价格量能表达式为主体的 tabular 核心特征集合。
    include_sets:
    - alpha158_builtin_v1
  price_volume_fundamental_core_v1:
    description: 价格量能表达式 + 基本面/估值/资金流原始扩展的正式集合。
    include_sets:
    - price_volume_expression_core_v1
    - native_extended_raw_v1
  price_volume_fundamental_event_core_v1:
    description: 价格量能表达式 + 基本面原始扩展 + 事件/两融原始扩展的正式集合。
    include_sets:
    - price_volume_fundamental_core_v1
    - native_margin_raw_v1
  short_horizon_state_core_v1:
    description: 短周期状态驱动研究核心集，包含微结构、流动性、可交易性与横截面比较特征。
    include_groups:
    - microstructure
    - liquidity
    - tradability
    - cross_section
  context_regime_overlay_v1:
    description: 市场环境、财务慢变量与上下文覆盖层。
    include_groups:
    - regime
    - fundamental
  research_semantic_default_v1:
    description: 当前研究 builder 推荐的默认正式特征集合。
    include_sets:
    - short_horizon_state_core_v1
    - context_regime_overlay_v1
  atomic_panel_core_v1:
    description: 未来 sequence 主通道优先使用的原子 panel 输入集合。
    include_groups:
    - price
    - liquidity
    - tradability
    - fundamental
  atomic_panel_plus_state_v1:
    description: 原子 panel 输入 + 少量单日状态与可交易性特征，适合未来序列模型的保守组合。
    include_sets:
    - atomic_panel_core_v1
    feature_ids:
    - F0193
    - F0194
    - F0195
    - F0197
    - F0198
    - F0208
    - F0209
    - F0212
  mixed_provider_demo_v1:
    description: 同时包含 Qlib Alpha158、原始扩展字段与自定义派生列的验证集合。
    feature_ids:
    - F0013
    - F0175
    - F0212
  tabular_baseline_v1:
    description: 兼容旧命名：baseline 集合。
    include_sets:
    - price_volume_expression_core_v1
  tabular_extended_v1:
    description: 兼容旧命名：extended 集合。
    include_sets:
    - price_volume_fundamental_core_v1
  tabular_margin_extended_v1:
    description: 兼容旧命名：margin_extended 集合。
    include_sets:
    - price_volume_fundamental_event_core_v1
  research_phase1_core_v1:
    description: 兼容旧命名：phase1 核心派生集合。
    include_sets:
    - short_horizon_state_core_v1
  research_context_v1:
    description: 兼容旧命名：context 集合。
    include_sets:
    - context_regime_overlay_v1
  research_default_v1:
    description: 兼容旧命名：research 默认集合。
    include_sets:
    - research_semantic_default_v1
  sequence_native_core_v1:
    description: 兼容旧命名：sequence 原子 panel 集合。
    include_sets:
    - atomic_panel_core_v1
  transformer_core_v1:
    description: 兼容旧命名：transformer 核心集合。
    include_sets:
    - atomic_panel_plus_state_v1
  hybrid_research_demo_v1:
    description: 兼容旧命名：混合集验证。
    include_sets:
    - mixed_provider_demo_v1
  legacy_phase1_raw_v1:
    description: 历史 phase1 训练入口兼容映射。
    include_sets:
    - price_volume_fundamental_core_v1
  legacy_phase12_raw_v1:
    description: 历史 phase12 训练入口兼容映射。
    include_sets:
